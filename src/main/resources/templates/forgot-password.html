<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Recuperar contraseña</title>
  <link rel="icon" type="image/x-icon" th:href="@{/img/logo.ico}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/JS/css/login.css}">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div class="card">
    <h2>Recuperar contraseña</h2>

    <form method="post" th:action="@{/forgot-password}">
      <label>Correo</label>
      <input name="email" type="email" required placeholder="correo@dominio.com"/>
      <button type="submit">Enviar</button>
    </form>

    <div class="msg" th:if="${msg}" th:text="${msg}"></div>
    <div style="margin-top:12px;">
      <a th:href="@{/login}">Volver al login</a>
    </div>
  </div>
</body>
</html>
