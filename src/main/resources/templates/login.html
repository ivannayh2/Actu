<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Login</title>
  <link rel="icon" type="image/x-icon" th:href="@{/img/logo.ico}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/JS/css/login.css}">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body th:classappend="${param.error != null or param.logout != null or param.resetok != null or param.inactivo != null} ? ' intro-skip' : ' intro-active'">

  <div class="logo-intro" id="logoIntro" aria-hidden="false">
    <button type="button" class="logo-intro-btn" id="startLoginBtn" aria-label="Entrar al inicio de sesión">
      <img th:src="@{/img/logo.png}" alt="Logo">
    </button>
  </div>

  <div class="card" id="loginCard">

    <div class="logo-box">
      <img th:src="@{/img/logo.png}" alt="Logo">
    </div>

    <h2>¡Bienvenido!</h2>
    <p class="subtitle">Ingresa con tu usuario para continuar</p>

    <form method="post" th:action="@{/login}" autocomplete="on">

          <label>Usuario</label>
          <input name="codigo"
             placeholder="Usuario"
             required
             autocomplete="username" />

          <label for="clave">Clave</label>
          <div class="input-row">
       <input id="clave" name="clave"
         type="password"
         placeholder="**************"
         required
         autocomplete="current-password" />
       <button type="button" class="toggle-pass" data-target="clave" aria-label="Mostrar contraseña" aria-pressed="false">
         <img class="toggle-pass-icon" th:src="@{/icons/ojo.png}" src="/icons/ojo.png" alt="" aria-hidden="true">
       </button>
          </div>

          <button type="submit" class="login-submit">Ingresar</button>
    </form>

    <div class="msg msg-error" th:if="${param.error}">
      Usuario o clave incorrectos
    </div>

    <div class="msg msg-error" th:if="${param.inactivo}">
      Tu cuenta está inactiva.
    </div>

    <div class="msg msg-info" th:if="${param.logout}">
      Sesión cerrada correctamente
    </div>

    <div class="msg msg-ok" th:if="${param.resetok}">
      Contraseña actualizada. Ya puedes iniciar sesión.
    </div>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var body = document.body;
      var intro = document.getElementById('logoIntro');
      var trigger = document.getElementById('startLoginBtn');

      document.querySelectorAll('.toggle-pass').forEach(function (btn) {
        btn.addEventListener('click', function () {
          var inputId = this.getAttribute('data-target');
          var input = document.getElementById(inputId);
          var icon = this.querySelector('.toggle-pass-icon');
          if (!input) {
            return;
          }

          var show = input.type === 'password';
          input.type = show ? 'text' : 'password';
          if (icon) {
            icon.src = show ? '/icons/ojo2.png' : '/icons/ojo.png';
          }
          this.setAttribute('aria-pressed', show ? 'true' : 'false');
          this.setAttribute('aria-label', show ? 'Ocultar contraseña' : 'Mostrar contraseña');
        });
      });

      if (!intro || !trigger || !body.classList.contains('intro-active')) {
        return;
      }

      var autoRevealTimer = null;

      function revealLogin() {
        if (!body.classList.contains('intro-active')) {
          return;
        }

        if (autoRevealTimer) {
          window.clearTimeout(autoRevealTimer);
          autoRevealTimer = null;
        }

        body.classList.add('intro-exit');

        window.setTimeout(function () {
          body.classList.remove('intro-active', 'intro-exit');
          intro.setAttribute('aria-hidden', 'true');
          intro.style.display = 'none';
          var userInput = document.querySelector('input[name="codigo"]');
          if (userInput) {
            userInput.focus();
          }
        }, 520);
      }

      trigger.addEventListener('click', revealLogin);
      trigger.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          revealLogin();
        }
      });

      autoRevealTimer = window.setTimeout(revealLogin, 1500);
    });
  </script>
</body>
</html>
