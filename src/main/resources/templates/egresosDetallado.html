<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Comprobante egreso</title>

  <link rel="icon" type="image/x-icon" th:href="@{/img/logo.ico}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/JS/css/layout.css}">
  <link rel="stylesheet" th:href="@{/JS/css/usuarios.css}">
  <link rel="stylesheet" th:href="@{/JS/css/egresos.css}">

  <style>
    .smart-search-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      grid-column: 1 / -1;
      width: 100%;
    }

    .search-status {
      font-size: 0.92rem;
      opacity: 0.8;
    }

    .table-hidden {
      display: none !important;
    }

    .text-right {
      text-align: right;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
      white-space: nowrap;
    }

    a.btn.btn-compact {
      transition: color 0.25s, background 0.25s;
      position: relative;
      z-index: 1;
    }

    a.btn.btn-compact:hover,
    button.btn.btn-compact:hover {
      color: #424ce1;
      background: #ffffff00;
      box-shadow: 0 2px 8px 0 rgba(78,140,255,0.08);
      text-decoration: none;
      transition: color 0.25s, background 0.25s, box-shadow 0.25s;
    }
  </style>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar('egresos')}"></div>
  <div th:replace="~{fragments/sidebar :: sidebar('egresos')}"></div>

  <main class="container egresos-page">
    <div th:if="${ok}" class="alert alert-ok" th:text="${ok}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="page-head">
      <div class="page-head-left">
        <h1>Comprobante egreso</h1>
        <p class="subtitle-main">Listado general de facturas según permisos del usuario</p>
      </div>
    </div>

    <form id="filtersForm" class="filters" method="get" th:action="@{/egresos}">
      <div class="field" th:if="${puedeFiltrarProveedor}">
        <label for="proveedor">Proveedor</label>
        <div class="control">
          <input id="proveedor" type="search" name="proveedor" th:value="${proveedor}">
        </div>
      </div>

      <div class="field">
        <label for="fechaDocumento">Fecha</label>
        <div class="control">
          <input id="fechaDocumento" type="date" name="fechaDocumento" th:value="${fechaDocumento}">
        </div>
      </div>

      <div class="field">
        <label for="doctoSa">Número factura</label>
        <div class="control">
          <input id="doctoSa" type="search" name="doctoSa" th:value="${doctoSa}">
        </div>
      </div>

      <div class="field" th:if="${!#lists.isEmpty(detalles)}">
        <label for="smartSearch">Búsqueda inteligente</label>
        <div class="control">
          <input
            id="smartSearch"
            type="search"
            placeholder="Busca por factura, débito o crédito..."
            autocomplete="off"
            aria-describedby="searchStatus">
        </div>
      </div>

      <div class="smart-search-actions" th:if="${!#lists.isEmpty(detalles)}">
        <span id="searchStatus" class="search-status" aria-live="polite"></span>
      </div>

      <div class="filters-actions">
        <button class="btn btn-primary btn-compact" type="submit">
          <img class="btn-icon" th:src="@{/icons/filtrar.svg}" alt="">
          Filtrar
        </button>

        <button id="clearAllBtn" class="btn btn-compact" type="button">
          <img class="btn-icon" th:src="@{/icons/limpiar.svg}" alt="">
          Limpiar
        </button>
      </div>
    </form>

    <div class="page-actions" th:if="${puedeCrearEgreso}">
      <button id="openModalBtn" class="btn btn-primary" type="button">Nuevo egreso</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Número factura</th>
            <th class="text-right">Débitos</th>
            <th class="text-right">Créditos</th>
          </tr>
        </thead>

        <tbody id="tablaDetallesBody">
          <tr th:if="${#lists.isEmpty(detalles)}">
            <td colspan="3">No se encontraron facturas relacionadas.</td>
          </tr>

          <tr id="sinCoincidenciasRow" class="table-hidden">
            <td colspan="3">No se encontraron coincidencias con la búsqueda.</td>
          </tr>

          <tr th:each="d : ${detalles}"
              th:with="
                factura=${d.doctoSa != null ? d.doctoSa : '-'},
                valorAjustado=${(d.vlrEgreso != null ? d.vlrEgreso : 0) + (d.prontoPago != null ? d.prontoPago : 0)},
                debitoValor=${valorAjustado > 0 ? valorAjustado : 0},
                creditoValor=${valorAjustado < 0 ? valorAjustado.abs() : 0}
              "
              class="detalle-row"
              th:attr="
                data-factura=${factura},
                data-debito=${debitoValor},
                data-credito=${creditoValor},
                data-search=${factura + ' ' + debitoValor + ' ' + creditoValor}
              ">

            <td class="cell-actions">
              <span th:text="${factura}"></span>
              <a class="btn btn-compact"
                 th:if="${d.doctoCausacion != null}"
                 th:href="@{/egresos/detalles(doctoCausacion=${d.doctoCausacion})}">
                Ver detalle
              </a>
            </td>

            <td class="text-right"
                th:text="${debitoValor > 0
                          ? '$ ' + #numbers.formatDecimal(debitoValor, 1, 'POINT', 2, 'COMMA')
                          : '-'}">
            </td>

            <td class="text-right"
                th:text="${creditoValor > 0
                          ? '$ ' + #numbers.formatDecimal(creditoValor, 1, 'POINT', 2, 'COMMA')
                          : '-'}">
            </td>
          </tr>

          <tr th:if="${!#lists.isEmpty(detalles)}" class="fila-resumen">
            <td><strong>Valor documento</strong></td>
            <td></td>
            <td class="text-right">
              <strong th:text="${'$ ' + #numbers.formatDecimal(totalValorDocto, 1, 'POINT', 2, 'COMMA')}"></strong>
            </td>
          </tr>

          <tr th:if="${!#lists.isEmpty(detalles)}" class="fila-resumen">
            <td><strong>Pronto pago</strong></td>
            <td></td>
            <td class="text-right">
              <strong th:text="${'$ ' + #numbers.formatDecimal(totalProntoPago, 1, 'POINT', 2, 'COMMA')}"></strong>
            </td>
          </tr>

          <tr id="filaTotales" th:if="${!#lists.isEmpty(detalles)}">
            <td><strong>Total</strong></td>
            <td class="text-right">
              <strong id="totalDebitosView"
                      th:text="${'$ ' + #numbers.formatDecimal(totalDebitos, 1, 'POINT', 2, 'COMMA')}"></strong>
            </td>
            <td class="text-right">
              <strong id="totalCreditosView"
                      th:text="${'$ ' + #numbers.formatDecimal(totalCreditos + totalProntoPago + totalValorDocto, 1, 'POINT', 2, 'COMMA')}"></strong>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="modal"
         class="modal hidden"
         th:if="${puedeCrearEgreso}"
         aria-hidden="true"
         role="dialog"
         aria-modal="true"
         aria-labelledby="modalTitle">
      <div class="modal-content" role="document">
        <div class="modal-head">
          <h3 id="modalTitle">Nuevo egreso</h3>
          <button id="closeModalBtn" class="btn" type="button" aria-label="Cerrar modal">X</button>
        </div>

        <form class="modal-form" method="post" th:action="@{/egresos}" enctype="multipart/form-data">
          <div class="field-row">
            <label for="m-numeroEgreso">Número egreso</label>
            <input id="m-numeroEgreso" type="text" name="numeroEgreso" required maxlength="30" placeholder="Ej. EG-2026-001">
          </div>

          <div class="field-row">
            <label for="m-proveedor">Proveedor</label>
            <select id="m-proveedor" name="proveedor" required>
              <option value="">Seleccione un proveedor</option>
              <option th:each="p : ${proveedoresOptions}"
                      th:value="${p.usuarioCodigo}"
                      th:text="${p.usuario != null ? p.usuario.nombreUsuario : p.usuarioCodigo}">
              </option>
            </select>
          </div>

          <div class="field-row">
            <label for="m-valorEgreso">Valor egreso</label>
            <input id="m-valorEgreso" type="number" step="0.01" min="0" name="valorEgreso" required placeholder="0.00">
          </div>

          <div class="field-row">
            <label for="m-fechaDocumento">Fecha documento</label>
            <input id="m-fechaDocumento" type="date" name="fechaDocumento" required>
          </div>

          <div class="field-row">
            <label for="m-soporte">Soporte de pago</label>
            <input id="m-soporte" type="file" name="soporte" accept="application/pdf,image/*">
          </div>

          <div class="modal-actions">
            <button class="btn" type="button" id="cancelModalBtn">Cancelar</button>
            <button class="btn btn-primary" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    (function () {
      function formatMoney(value) {
        return '$ ' + Number(value || 0).toLocaleString('es-CO', {
          minimumFractionDigits: 2,
          maximumFractionDigits: 2
        });
      }

      function normalizeText(text) {
        return (text || '')
          .toString()
          .toLowerCase()
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .trim();
      }

      function debounce(fn, delay) {
        let timer;
        return function () {
          const context = this;
          const args = arguments;
          clearTimeout(timer);
          timer = setTimeout(function () {
            fn.apply(context, args);
          }, delay);
        };
      }

      document.addEventListener('DOMContentLoaded', function () {
        const filtersForm = document.querySelector('form.filters');
        const proveedorInput = document.getElementById('proveedor');
        const fechaDocumentoInput = document.getElementById('fechaDocumento');
        const doctoSaInput = document.getElementById('doctoSa');

        const modal = document.getElementById('modal');
        const openModalBtn = document.getElementById('openModalBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const cancelModalBtn = document.getElementById('cancelModalBtn');

        const filtersForm = document.getElementById('filtersForm');
        const proveedorInput = document.getElementById('proveedor');
        const fechaDocumentoInput = document.getElementById('fechaDocumento');
        const doctoSaInput = document.getElementById('doctoSa');
        const smartSearchInput = document.getElementById('smartSearch');
        const clearAllBtn = document.getElementById('clearAllBtn');
        const searchStatus = document.getElementById('searchStatus');

        const rows = Array.from(document.querySelectorAll('.detalle-row'));
        const totalsRow = document.getElementById('filaTotales');
        const noResultsRow = document.getElementById('sinCoincidenciasRow');
        const totalDebitosView = document.getElementById('totalDebitosView');
        const totalCreditosView = document.getElementById('totalCreditosView');

        const rowData = rows.map(function (row) {
          return {
            element: row,
            searchText: normalizeText(row.dataset.search),
            debito: parseFloat(row.dataset.debito || '0'),
            credito: parseFloat(row.dataset.credito || '0')
          };
        });

        function openModal() {
          if (!modal) return;
          modal.classList.remove('hidden');
          modal.setAttribute('aria-hidden', 'false');
        }

        function closeModal() {
          if (!modal) return;
          modal.classList.add('hidden');
          modal.setAttribute('aria-hidden', 'true');
        }

        function updateSearchStatus(visibleCount, totalCount, hasTerm) {
          if (!searchStatus) return;

          if (!hasTerm) {
            searchStatus.textContent = 'Mostrando ' + totalCount + ' registros.';
            return;
          }

          searchStatus.textContent = 'Mostrando ' + visibleCount + ' de ' + totalCount + ' registros.';
        }

        function filterTable() {
          if (!rowData.length) return;

          const term = normalizeText(smartSearchInput ? smartSearchInput.value : '');
          let visibleCount = 0;
          let totalDebitos = 0;
          let totalCreditos = 0;

          rowData.forEach(function (row) {
            const matches = !term || row.searchText.includes(term);

            row.element.classList.toggle('table-hidden', !matches);

            if (matches) {
              visibleCount++;
              totalDebitos += row.debito;
              totalCreditos += row.credito;
            }
          });

          if (totalsRow) {
            totalsRow.classList.toggle('table-hidden', visibleCount === 0);
          }

          if (noResultsRow) {
            noResultsRow.classList.toggle('table-hidden', visibleCount !== 0);
          }

          if (totalDebitosView) {
            totalDebitosView.textContent = formatMoney(totalDebitos);
          }

          if (totalCreditosView) {
            totalCreditosView.textContent = formatMoney(totalCreditos);
          }

          updateSearchStatus(visibleCount, rowData.length, !!term);
        }

        const debouncedFilterTable = debounce(filterTable, 120);
        const debouncedSubmitFilters = debounce(function () {
          if (!filtersForm) return;
          if (typeof filtersForm.requestSubmit === 'function') {
            filtersForm.requestSubmit();
            return;
          }
          filtersForm.submit();
        }, 350);

        function bindAutoSubmit(input, events) {
          if (!input) return;
          events.forEach(function (eventName) {
            input.addEventListener(eventName, debouncedSubmitFilters);
          });
        }

        bindAutoSubmit(proveedorInput, ['input', 'search']);
        bindAutoSubmit(fechaDocumentoInput, ['change']);
        bindAutoSubmit(doctoSaInput, ['input', 'search']);

        if (smartSearchInput) {
          smartSearchInput.addEventListener('input', debouncedFilterTable);
          updateSearchStatus(rowData.length, rowData.length, false);
        }

        if (clearAllBtn) {
          clearAllBtn.addEventListener('click', function () {
            if (proveedorInput) proveedorInput.value = '';
            if (fechaDocumentoInput) fechaDocumentoInput.value = '';
            if (doctoSaInput) doctoSaInput.value = '';
            if (smartSearchInput) smartSearchInput.value = '';

            filterTable();

            if (window.location.search) {
              window.location.href = filtersForm ? filtersForm.getAttribute('action') || '/egresos' : '/egresos';
              return;
            }

            if (proveedorInput) {
              proveedorInput.focus();
            } else if (fechaDocumentoInput) {
              fechaDocumentoInput.focus();
            } else if (doctoSaInput) {
              doctoSaInput.focus();
            } else if (smartSearchInput) {
              smartSearchInput.focus();
            }
          });
        }

        if (openModalBtn) {
          openModalBtn.addEventListener('click', openModal);
        }

        if (closeModalBtn) {
          closeModalBtn.addEventListener('click', closeModal);
        }

        if (cancelModalBtn) {
          cancelModalBtn.addEventListener('click', closeModal);
        }

        if (modal) {
          modal.addEventListener('click', function (event) {
            if (event.target === modal) {
              closeModal();
            }
          });
        }

        document.addEventListener('keydown', function (event) {
          if (event.key === 'Escape') {
            closeModal();
          }
        });
      });
    })();
  </script>

</body>
</html>
