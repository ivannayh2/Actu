<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Detalle egreso</title>
  <link rel="icon" type="image/x-icon" th:href="@{/img/logo.ico}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/JS/css/layout.css}">
  <link rel="stylesheet" th:href="@{/JS/css/usuarios.css}">
  <link rel="stylesheet" th:href="@{/JS/css/egresos.css}">
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar('egresos')}"></div>
  <div th:replace="~{fragments/sidebar :: sidebar('egresos')}"></div>

  <div class="detalle-container">
    <h2>
      Detalle del egreso:
      <span th:text="${doctoEgreso}"></span>
    </h2>

    <a class="btn" th:href="@{/egresos}">Volver</a>
  </div>

  <table class="tabla-egresos">
    <thead>
      <tr>
        <th>Numero factura</th>
        <th>Fecha egreso</th>
        <th>Tercero</th>
        <th>Valor egreso</th>
      </tr>
    </thead>
    <tbody>

  <!-- TOTAL -->
  <tr th:if="${!#lists.isEmpty(detalles)}">
  <td colspan="3"><strong>Total</strong></td>
  <td>
    <strong th:text="'$ ' + ${#numbers.formatDecimal(totalDetalleEgreso, 1, 'POINT', 2, 'COMMA')}"></strong>
  </td>
</tr>

  <!-- REGISTROS -->
  <tr th:each="d : ${detalles}">
    <td>
      <div class="acciones-causacion">
        <span th:text="${d.doctoCausacion}"></span>
        <a class="btn btn-primary"
           th:href="@{/egresos/detalles(doctoCausacion=${d.doctoCausacion})}">
          Ver detalle
        </a>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Docto causación</th>
            <th>Fecha egreso</th>
            <th>Tercero</th>
            <th>Valor egreso</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="d : ${detalles}">
            <td th:text="${d.doctoCausacion}"></td>
            <td th:text="${d.fechaEgreso != null ? #temporals.format(d.fechaEgreso, 'dd/MM/yyyy') : '-'}"></td>
            <td th:text="${d.tercero}"></td>
            <td th:text="${d.vlrEgreso != null ? '$ ' + #numbers.formatDecimal(d.vlrEgreso, 1, 'POINT', 2, 'COMMA') : '-'}"></td>
            <td class="cell-actions">
              <a class="link-detalle"
                 th:href="@{/egresos/detalles(doctoCausacion=${d.doctoCausacion})}">
                Ver detalle
              </a>
            </td>
          </tr>

          <tr th:if="${#lists.isEmpty(detalles)}">
            <td colspan="5">No se encontraron doctos de causación relacionados.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
