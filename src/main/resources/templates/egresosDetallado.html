<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Comprobante egreso</title>

  <link rel="icon" type="image/x-icon" th:href="@{/img/logo.ico}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/JS/css/layout.css}">
  <link rel="stylesheet" th:href="@{/JS/css/usuarios.css}">
  <link rel="stylesheet" th:href="@{/JS/css/egresos.css}">

  <style>
    .smart-search-wrap {
      margin: 16px 0;
      display: flex;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
    }

    .smart-search-wrap .field {
      min-width: 280px;
      flex: 1;
    }

    .table-hidden {
      display: none;
    }

    .text-right {
      text-align: right;
    }
  </style>
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar('egresos')}"></div>
  <div th:replace="~{fragments/sidebar :: sidebar('egresos')}"></div>

  <main class="container egresos-page">
    <div th:if="${ok}" class="alert alert-ok" th:text="${ok}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="page-head">
      <div class="page-head-left">
        <h1>Comprobante egreso</h1>
        <p class="subtitle-main">Listado general de facturas según permisos del usuario</p>
      </div>
    </div>

    <form class="filters" method="get" th:action="@{/egresos}">
      <div class="field" th:if="${puedeFiltrarProveedor}">
        <label for="proveedor">Proveedor</label>
        <div class="control">
          <input id="proveedor" type="search" name="proveedor" th:value="${proveedor}">
        </div>
      </div>

      <div class="field">
        <label for="fechaDocumento">Fecha</label>
        <div class="control">
          <input id="fechaDocumento" type="date" name="fechaDocumento" th:value="${fechaDocumento}">
        </div>
      </div>

      <div class="field">
        <label for="doctoSa">Número factura</label>
        <div class="control">
          <input id="doctoSa" type="search" name="doctoSa" th:value="${doctoSa}">
        </div>
      </div>

      <div class="filters-actions">
        <button class="btn btn-primary btn-compact" type="submit">
          <img class="btn-icon" th:src="@{/icons/filtrar.svg}" alt="">
          Filtrar
        </button>

        <a class="btn btn-compact" th:href="@{/egresos}">
          <img class="btn-icon" th:src="@{/icons/limpiar.svg}" alt="">
          Limpiar
        </a>
      </div>
    </form>

    <!-- Buscador inteligente en vivo -->
    <div class="smart-search-wrap" th:if="${!#lists.isEmpty(detalles)}">
      <div class="field">
        <label for="smartSearch">Búsqueda inteligente</label>
        <div class="control">
          <input
            id="smartSearch"
            type="search"
            placeholder="Busca por factura, débito o crédito..."
            autocomplete="off">
        </div>
      </div>
    </div>

    <div class="page-actions" th:if="${puedeCrearEgreso}">
      <button class="btn btn-primary" type="button" onclick="openModal()">Nuevo egreso</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Número factura</th>
            <th>Débitos</th>
            <th>Créditos</th>
          </tr>
        </thead>

        <tbody id="tablaDetallesBody">

          <!-- Cuando no hay datos -->
          <tr th:if="${#lists.isEmpty(detalles)}">
            <td colspan="3">No se encontraron facturas relacionadas.</td>
          </tr>

          <!-- Totales -->
          <tr id="filaTotales" th:if="${!#lists.isEmpty(detalles)}">
            <td><strong>Total</strong></td>
            <td class="text-right">
              <strong id="totalDebitosView"
                      th:text="${'$ ' + #numbers.formatDecimal(totalDebitos, 1, 'POINT', 2, 'COMMA')}"></strong>
            </td>
            <td class="text-right">
              <strong id="totalCreditosView"
                      th:text="${'$ ' + #numbers.formatDecimal(totalCreditos, 1, 'POINT', 2, 'COMMA')}"></strong>
            </td>
          </tr>

          <!-- Mensaje sin coincidencias del buscador inteligente -->
          <tr id="sinCoincidenciasRow" class="table-hidden">
            <td colspan="3">No se encontraron coincidencias con la búsqueda.</td>
          </tr>

          <!-- Filas de datos -->
          <tr th:each="d : ${detalles}"
              class="detalle-row"
              th:attr="
                data-factura=${d.doctoSa != null ? d.doctoSa : ''},
                data-debito=${d.vlrEgreso != null and d.vlrEgreso > 0 ? d.vlrEgreso : 0},
                data-credito=${d.vlrEgreso != null and d.vlrEgreso < 0 ? d.vlrEgreso.abs() : 0},
                data-search=${(d.doctoSa != null ? d.doctoSa : '') + ' ' + (d.vlrEgreso != null and d.vlrEgreso > 0 ? d.vlrEgreso : '') + ' ' + (d.vlrEgreso != null and d.vlrEgreso < 0 ? d.vlrEgreso.abs() : '')}
              ">
            
            <!-- Número de factura -->
            <td class="cell-actions">
              <span th:text="${d.doctoSa != null ? d.doctoSa : '-'}"></span>
              <a class="btn btn-compact"
                 th:if="${d.doctoCausacion != null}"
                 th:href="@{/egresos/detalles(doctoCausacion=${d.doctoCausacion})}">
                Ver detalle
              </a>
            </td>

            <!-- Débitos: valores positivos -->
            <td class="text-right"
                th:text="${d.vlrEgreso != null and d.vlrEgreso > 0
                          ? '$ ' + #numbers.formatDecimal(d.vlrEgreso, 1, 'POINT', 2, 'COMMA')
                          : '-'}">
            </td>

            <!-- Créditos: valores negativos convertidos a positivo -->
            <td class="text-right"
                th:text="${d.vlrEgreso != null and d.vlrEgreso < 0
                          ? '$ ' + #numbers.formatDecimal(d.vlrEgreso * -1, 1, 'POINT', 2, 'COMMA')
                          : '-'}">
            </td>

          </tr>

        </tbody>
      </table>
    </div>

    <div id="modal" class="modal hidden" onclick="closeModal()" th:if="${puedeCrearEgreso}">
      <div class="modal-content" onclick="event.stopPropagation()">
        <div class="modal-head">
          <h3>Nuevo egreso</h3>
          <button class="btn" type="button" onclick="closeModal()">X</button>
        </div>

        <form class="modal-form" method="post" th:action="@{/egresos}" enctype="multipart/form-data">
          <div class="field-row">
            <label for="m-numeroEgreso">Numero egreso</label>
            <input id="m-numeroEgreso" type="text" name="numeroEgreso" required maxlength="30" placeholder="Ej. EG-2026-001">
          </div>

          <div class="field-row">
            <label for="m-proveedor">Proveedor</label>
            <select id="m-proveedor" name="proveedor" required>
              <option value="">Seleccione un proveedor</option>
              <option th:each="p : ${proveedoresOptions}"
                      th:value="${p.usuarioCodigo}"
                      th:text="${p.usuario != null ? p.usuario.nombreUsuario : p.usuarioCodigo}">
              </option>
            </select>
          </div>

          <div class="field-row">
            <label for="m-valorEgreso">Valor egreso</label>
            <input id="m-valorEgreso" type="number" step="0.01" min="0" name="valorEgreso" required placeholder="0.00">
          </div>

          <div class="field-row">
            <label for="m-fechaDocumento">Fecha documento</label>
            <input id="m-fechaDocumento" type="date" name="fechaDocumento" required>
          </div>

          <div class="field-row">
            <label for="m-soporte">Soporte de pago</label>
            <input id="m-soporte" type="file" name="soporte" accept="application/pdf,image/*">
          </div>

          <div class="modal-actions">
            <button class="btn" type="button" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" type="submit">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script>
    function openModal() {
      var modal = document.getElementById('modal');
      if (modal) {
        modal.classList.remove('hidden');
      }
    }

    function closeModal() {
      var modal = document.getElementById('modal');
      if (modal) {
        modal.classList.add('hidden');
      }
    }

    function formatMoney(value) {
      return '$ ' + Number(value || 0).toLocaleString('es-CO', {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function normalizarTexto(texto) {
      return (texto || '')
        .toString()
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim();
    }

    document.addEventListener('DOMContentLoaded', function () {
      var input = document.getElementById('smartSearch');
      var filas = Array.from(document.querySelectorAll('.detalle-row'));
      var filaTotales = document.getElementById('filaTotales');
      var sinCoincidenciasRow = document.getElementById('sinCoincidenciasRow');
      var totalDebitosView = document.getElementById('totalDebitosView');
      var totalCreditosView = document.getElementById('totalCreditosView');

      if (!input || !filas.length) {
        return;
      }

      function filtrarTabla() {
        var termino = normalizarTexto(input.value);
        var visibles = 0;
        var totalDebitos = 0;
        var totalCreditos = 0;

        filas.forEach(function (fila) {
          var factura = normalizarTexto(fila.dataset.factura);
          var debito = normalizarTexto(fila.dataset.debito);
          var credito = normalizarTexto(fila.dataset.credito);
          var search = normalizarTexto(fila.dataset.search);

          var coincide =
            termino === '' ||
            factura.includes(termino) ||
            debito.includes(termino) ||
            credito.includes(termino) ||
            search.includes(termino);

          if (coincide) {
            fila.classList.remove('table-hidden');
            visibles++;

            totalDebitos += parseFloat(fila.dataset.debito || '0');
            totalCreditos += parseFloat(fila.dataset.credito || '0');
          } else {
            fila.classList.add('table-hidden');
          }
        });

        if (filaTotales) {
          filaTotales.classList.toggle('table-hidden', visibles === 0);
        }

        if (sinCoincidenciasRow) {
          sinCoincidenciasRow.classList.toggle('table-hidden', visibles !== 0);
        }

        if (totalDebitosView) {
          totalDebitosView.textContent = formatMoney(totalDebitos);
        }

        if (totalCreditosView) {
          totalCreditosView.textContent = formatMoney(totalCreditos);
        }
      }

      input.addEventListener('input', filtrarTabla);
    });
  </script>
</body>
</html>
