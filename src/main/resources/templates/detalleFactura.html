<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Detalle facturas</title>
  <link rel="icon" type="image/x-icon" th:href="@{/img/logo.ico}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/JS/css/layout.css}">
  <link rel="stylesheet" th:href="@{/JS/css/usuarios.css}">
  <link rel="stylesheet" th:href="@{/JS/css/egresos.css}">
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar('egresos')}"></div>
  <div th:replace="~{fragments/sidebar :: sidebar('egresos')}"></div>

  <main class="container egresos-page">
    <div class="page-head">
      <div class="page-head-left">
        <h1>Facturas relacionadas</h1>
        <p class="subtitle-main">
          Docto causación: <strong th:text="${doctoCausacion}"></strong>
        </p>
      </div>
      <div class="actions">
        <a class="btn" th:href="@{/egresos}">Volver</a>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Docto causación</th>
            <th>Documento</th>
            <th>Fecha</th>
            <th>Proveedor</th>
            <th>Descripción</th>
            <th>Valor neto</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="f : ${facturas}">
            <td th:text="${f.doctoCausacion}"></td>
            <td th:text="${f.documento}"></td>
            <td th:text="${f.fecha != null ? #temporals.format(f.fecha, 'dd/MM/yyyy') : '-'}"></td>
            <td th:text="${f.proveedor}"></td>
            <td th:text="${f.descItem}"></td>
            <td th:text="${f.valorNeto != null ? '$ ' + #numbers.formatDecimal(f.valorNeto, 1, 'POINT', 2, 'COMMA') : '-'}"></td>
          </tr>

          <tr th:if="${#lists.isEmpty(facturas)}">
            <td colspan="6">No se encontraron facturas relacionadas.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
