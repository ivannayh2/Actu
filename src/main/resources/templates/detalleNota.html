<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Detalle facturas</title>
  <link rel="icon" type="image/x-icon" th:href="@{/img/logo.ico}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/JS/css/layout.css}">
  <link rel="stylesheet" th:href="@{/JS/css/usuarios.css}">
  <link rel="stylesheet" th:href="@{/JS/css/egresos.css}">
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar('egresos')}"></div>
  <div th:replace="~{fragments/sidebar :: sidebar('egresos')}"></div>

  <main class="container egresos-page">
    <div class="page-head">
      <div class="page-head-left">
        <h1>Notas relacionadas</h1>
      </div>
      <div class="actions">
        <button class="btn" onclick="history.back()">Volver</button>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Documento</th>
            <th>Nota</th>
          </tr>
        </thead>
        <tbody>
  <tr th:each="info : ${infoNotas}">
    <td th:text="${doctoSa}"></td>
    <td th:text="${info}"></td>
  </tr>

  <tr th:if="${#lists.isEmpty(infoNotas)}">
    <td colspan="2">No se encontró información en notas para este documento.</td>
  </tr>
</tbody>
      </table>
    </div>
  </main>
</body>
</html>
