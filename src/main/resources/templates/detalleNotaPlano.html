<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Notas del documento</title>

  <link rel="icon" type="image/x-icon" th:href="@{/img/logo.ico}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" th:href="@{/JS/css/layout.css}">
  <link rel="stylesheet" th:href="@{/JS/css/usuarios.css}">
  <link rel="stylesheet" th:href="@{/JS/css/egresos.css}">
</head>
<body>
  <div th:replace="~{fragments/topbar :: topbar('egresos')}"></div>
  <div th:replace="~{fragments/sidebar :: sidebar('egresos')}"></div>

  <main class="container egresos-page">
    <div class="page-head">
      <div class="page-head-left">
        <h1>Notas del documento</h1>
        <p class="subtitle-main">Registro de notas asociadas</p>
      </div>
    </div>

    <div class="table-wrap">
      <table class="nota-plano-table">
        <thead>
          <tr>
            <th>Docto proveedor</th>
            <th>Notas</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td th:text="${nota.doctoProveedor}"></td>
            <td th:text="${nota.notas}"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="actions">
      <button class="btn" type="button" onclick="history.back()">Volver</button>
    </div>
  </main>
</body>
</html>
