<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Historial</title>
  <link rel="icon" type="image/x-icon" th:href="@{/img/logo.ico}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/JS/css/layout.css}">
  <link rel="stylesheet" th:href="@{/JS/css/usuarios.css}">
  <link rel="stylesheet" th:href="@{/JS/css/egresos.css}">
  <link rel="stylesheet" th:href="@{/JS/css/historial.css}">
</head>
<body>

<div th:replace="~{fragments/topbar :: topbar('historial')}"></div>
<div th:replace="~{fragments/sidebar :: sidebar('historial')}"></div>

<main class="container historial-page">
  <div class="page-head">
    <div class="page-head-left">
      <h1>Historial</h1>
      <p class="subtitle-main">Registro de todas las actividades del sistema</p>
    </div>
    <div class="page-actions">
      <button class="logout-btn limpiar-historial-btn" type="button" aria-label="Limpiar historial">
        <span>Limpiar Historial</span>
      </button>
    </div>
  </div>

  <form class="filters" method="get" th:action="@{/historial}">
    <h2 class="filter-title">Filtros</h2>

    <label>Usuario
      <input type="text" name="usuario" th:value="${usuario}" placeholder="Buscar por usuario">
    </label>

    <label>Tipo de movimiento
      <select name="tipoMovimiento" th:value="${tipoMovimiento}">
        <option value="">Todos</option>
        <option value="creo">Creó usuario</option>
        <option value="elimino">Eliminó usuario</option>
        <option value="inactivo">Inactivó usuario</option>
        <option value="activo">Activó usuario</option>
        <option value="archivo">Cargó archivo</option>
      </select>
    </label>

    <label>Fecha
      <input type="date" name="fecha" th:value="${fecha}">
    </label>

    <div style="margin-top: 1.2em; display: flex; gap: 1em;">
      <button type="submit" class="btn primary">Buscar</button>
      <a href="/historial" class="btn" style="background:#f3f4f6; color:#222; border:1px solid #cbd5e1;">Limpiar filtros</a>
    </div>
  </form>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Fecha y Hora</th>
          <th>Movimiento</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="carga : ${historial}">
          <td th:text="${carga.usuario}">system</td>
          <td th:text="${carga.fechaCarga}">2026-03-12 10:00</td>
          <td th:text="${carga.movimiento != '-' ? carga.movimiento : 'Cargó archivo de egresos ' + (carga.nombreEgresos != null ? carga.nombreEgresos : '-')}">Movimiento</td>
        </tr>
        <tr th:if="${#lists.isEmpty(historial)}">
          <td colspan="3">No hay registros de historial para los filtros seleccionados.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="table-foot">
    <p class="entries-count" th:text="'Mostrando ' + (totalCargas != null ? totalCargas : 0) + ' de ' + (totalCargas != null ? totalCargas : 0) + ' entradas'">Mostrando 0 de 0 entradas</p>
  </div>
</main>

</body>
</html>
