<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Comprobante egreso</title>
  <link rel="icon" type="image/x-icon" th:href="@{/img/logo.ico}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/JS/css/layout.css}">
  <link rel="stylesheet" th:href="@{/JS/css/usuarios.css}">
  <link rel="stylesheet" th:href="@{/JS/css/egresos.css}">
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar('egresos')}"></div>
<div th:replace="~{fragments/sidebar :: sidebar('egresos')}"></div>

<main class="container egresos-page">
<div class="page-head">
  <div class="page-head-left">
    <h1>Comprobante egreso</h1>
    <p class="subtitle-main">Consulta de egresos cargados desde archivos planos.</p>
  </div>
</div>

<div th:if="${ok}" class="alert alert-ok" th:text="${ok}"></div>
<div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

<form class="filters" method="get" th:action="@{/egresos}">
  <label>Proveedor
    <input type="text" name="proveedor" th:value="${proveedor}">
  </label>

  <label>Fecha
    <input type="date" name="fechaDocumento" th:value="${fechaDocumento}">
  </label>

  <label>Egreso:
    <input type="text" name="numeroEgreso" th:value="${numeroEgreso}">
  </label>

  <div class="filters-actions">
  <button class="btn btn-primary" type="submit">Filtrar</button>
  <a class="btn" th:href="@{/egresos}">Limpiar</a>
</div>

</form>

<div class="page-actions">
  <button class="btn btn-primary" type="button" onclick="openModal()">Nuevo egreso</button>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>UPLOAD</th>
        <th>DOCUMENTO DE EGRESO</th>
        <th>FECHA DE DOCUMENTO</th>
        <th>TERCERO</th>
        <th>RAZON SOCIAL</th>
        <th>VALOR DE EGRESO</th>
        <th>NOTAS</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="e : ${egresos}">
        <td th:text="${e.uploadId != null ? e.uploadId : '-'}"></td>
        <td th:text="${e.doctoEgreso}"></td>
        <td th:text="${e.fechaEgreso != null ? e.fechaEgreso : '-'}"></td>
        <td th:text="${e.tercero}"></td>
        <td th:text="${e.razonSocial}"></td>
        <td th:text="${e.valorEgreso != null ? #numbers.formatDecimal(e.valorEgreso, 1, 'COMMA', 2, 'POINT') : '-'}"></td>
        <td th:text="${e.notas != null && !#strings.isEmpty(e.notas) ? e.notas : '-'}"></td>
      </tr>
      <tr th:if="${#lists.isEmpty(egresos)}">
        <td colspan="7">No hay egresos para los filtros seleccionados.</td>
      </tr>
    </tbody>
  </table>
</div>

</main>


<div id="modal" class="modal hidden" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div class="modal-head">
      <h3>Nuevo egreso</h3>
      <button class="btn" type="button" onclick="closeModal()">X</button>
    </div>

    <form class="modal-form" method="post" action="/egresos" enctype="multipart/form-data">
      <div class="field-row">
        <label>Numero egreso:</label>
        <input type="text" name="numeroEgreso" required maxlength="30">
      </div>

      <div class="field-row">
        <label>Proveedor:</label>
        <input type="text" name="proveedor" required maxlength="120">
      </div>

      <div class="field-row">
        <label>Valor egreso:</label>
        <input type="number" step="0.01" name="valorEgreso" required>
      </div>

      <div class="field-row">
        <label>Fecha documento:</label>
        <input type="date" name="fechaDocumento" required>
      </div>

      <div class="field-row">
        <label>Cargar soporte pago:</label>
        <input type="file" name="soporte" accept="application/pdf,image/*">
      </div>

      <div class="modal-actions">
        <button class="btn btn-primary" type="submit">guardar</button>
        <button class="btn" type="button" onclick="closeModal()">cancelar</button>
      </div>
    </form>
  </div>
</div>

<script>
  function openModal(){ document.getElementById('modal').classList.remove('hidden'); }
  function closeModal(){ document.getElementById('modal').classList.add('hidden'); }
</script>

</body>
</html>
