<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Egresos</title>
</head>
<head>
  <meta charset="UTF-8" />
  <title>Egresos</title>
  <link rel="stylesheet" th:href="@{/JS/css/usuarios.css}">
  <link rel="stylesheet" th:href="@{/JS/css/egresos.css}">
</head>
<body>
<div th:replace="~{fragments/topbar :: topbar('egresos')}"></div>

<div th:if="${ok}" style="padding:12px;color:green" th:text="${ok}"></div>
<div th:if="${error}" style="padding:12px;color:red" th:text="${error}"></div>

<form class="filters" method="get" action="/egresos">
  <label>Proveedor
    <input type="text" name="proveedor" th:value="${proveedor}">
  </label>

  <label>Fecha
    <input type="date" name="fechaDocumento" th:value="${fechaDocumento}">
  </label>

  <label>Egreso:
    <input type="text" name="numeroEgreso" th:value="${numeroEgreso}">
  </label>

  <div class="filters-actions">
  <button class="btn btn-primary" type="submit">Filtrar</button>
  <a class="btn" href="/egresos">Limpiar</a>
</div>

</form>

<div style="padding:12px;">
  <button class="btn btn-primary" type="button" onclick="openModal()">Nuevo egreso</button>
</div>

<div style="padding:12px;">
  <table>
    <thead>
      <tr>
        <th>DOCUMENTO DE EGRESO</th>
        <th>FECHA DE DOCUMENTO</th>
        <th>PROVEEDOR</th>
        <th>VALOR DE EGRESO</th>
        <th>ACCIONES</th>
      </tr>
    </thead>
    <tbody>
      <tr th:each="e : ${egresos}">
        <td>
          <span th:text="${e.numeroEgreso}"></span>
          &nbsp; <a th:href="@{'/egresos/' + ${e.numeroEgreso}}">Ver detalle</a>
        </td>
        <td th:text="${e.fechaDocumento}"></td>
        <td th:text="${e.proveedor}"></td>
        <td th:text="${#numbers.formatDecimal(e.valorEgreso, 1, 'COMMA', 2, 'POINT')}"></td>
        <td class="actions">
          <a th:if="${e.rutaDocumento != null}" th:href="@{'/files/' + ${e.numeroEgreso}}" target="_blank">PDF</a>
          <a th:href="@{'/egresos/export/excel?numeroEgreso=' + ${e.numeroEgreso}}">Excel</a>
        </td>
      </tr>
      <tr th:if="${#lists.isEmpty(egresos)}">
        <td colspan="5">No hay egresos para los filtros seleccionados.</td>
      </tr>
    </tbody>
  </table>
</div>


<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="modal-content" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <h3>Nuevo egreso</h3>
      <button class="btn" type="button" onclick="closeModal()">X</button>
    </div>

    <form method="post" action="/egresos" enctype="multipart/form-data">
      <div>
        <label>Numero egreso:</label>
        <input type="text" name="numeroEgreso" required maxlength="30">
      </div>

      <div>
        <label>Proveedor:</label>
        <input type="text" name="proveedor" required maxlength="120">
      </div>

      <div>
        <label>Valor egreso:</label>
        <input type="number" step="0.01" name="valorEgreso" required>
      </div>

      <div>
        <label>Fecha documento:</label>
        <input type="date" name="fechaDocumento" required>
      </div>

      <div>
        <label>Cargar soporte pago:</label>
        <input type="file" name="soporte" accept="application/pdf,image/*">
      </div>

      <div style="margin-top:12px;display:flex;gap:10px;justify-content:center;">
        <button class="btn btn-primary" type="submit">guardar</button>
        <button class="btn" type="button" onclick="closeModal()">cancelar</button>
      </div>
    </form>
  </div>
</div>

<script>
  function openModal(){ document.getElementById('modal').style.display='block'; }
  function closeModal(){ document.getElementById('modal').style.display='none'; }
</script>

</body>
</html>
