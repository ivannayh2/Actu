<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Comprobante egreso</title>
  <link rel="icon" type="image/x-icon" th:href="@{/img/logo.ico}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/JS/css/layout.css}">
  <link rel="stylesheet" th:href="@{/JS/css/usuarios.css}">
  <link rel="stylesheet" th:href="@{/JS/css/egresos.css}">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <div th:replace="~{fragments/topbar :: topbar('egresos')}"></div>
  <div th:replace="~{fragments/sidebar :: sidebar('egresos')}"></div>


  
  <div th:if="${rol} == 'PROVEEDORES'" class="egresos-header-proveedor">
    <span class="egresos-header-proveedor-nombre" th:text="${nombreUsuario}"></span>
  </div>

  <main class="container egresos-page">
    <div th:if="${ok}" class="alert alert-ok" th:text="${ok}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>


    <form class="filters filters-with-busqueda" method="get" th:action="@{/egresos}">
      <div class="field field-proveedor" th:if="${puedeFiltrarProveedor}">
        <label for="proveedor">Proveedor</label>
        <div class="control">
          <input id="proveedor" type="search" name="proveedor" th:value="${proveedor}">
        </div>
      </div>

      <div class="field">
        <label for="fechaDocumento">Fecha</label>
        <div class="control">
          <input id="fechaDocumento" type="date" name="fechaDocumento" th:value="${fechaDocumento}">
        </div>
      </div>

      <div class="field">
        <label for="numeroEgreso">Numero egreso</label>
        <div class="control">
          <input id="numeroEgreso" type="search" name="numeroEgreso" th:value="${numeroEgreso}">
        </div>
      </div>

      <div class="field" style="min-width:220px;">
        <label for="busquedaInteligente">Búsqueda inteligente</label>
        <div class="control">
          <input id="busquedaInteligente" type="search" name="busquedaInteligente" placeholder="Buscar por descripción, valor, etc." th:value="${busquedaInteligente}">
        </div>
      </div>


      <div class="filters-actions" style="display: flex; align-items: flex-end; gap: 8px; margin-top: 0;">
        <button class="btn btn-primary btn-compact" type="submit">
          Filtrar
        </button>
        <a class="btn btn-compact" th:href="@{/egresos}">
          Limpiar
        </a>
      </div>
    </form>

    <div class="filters-actions"
     th:if="${puedeCrearEgreso}"
     style="display: flex; align-items: flex-end; gap: 8px; margin-top: 0; margin-bottom: 8px;">
      <button class="btn btn-primary" type="button" onclick="openModal()">
       Adjuntar soportes
      </button>
    </div>

    <div class="page-actions page-actions-tight">
      <a class="btn"
         th:href="@{/egresos/export/pdf(vista='resumen', proveedor=${proveedor}, numeroEgreso=${numeroEgreso}, fechaDocumento=${fechaDocumento})}">
        Descargar PDF
      </a>
      <a class="btn"
         th:href="@{/egresos/export/excel(vista='resumen', proveedor=${proveedor}, numeroEgreso=${numeroEgreso}, fechaDocumento=${fechaDocumento})}">
        Descargar Excel
      </a>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Numero egreso</th>
            <th>Detalle</th>
            <th>Fecha egreso</th>
            <th>Nit proveedor</th>
            <th>Razon social</th>
            <th>Valor</th>
          </tr>
        </thead>
        <tbody>
          <tr th:if="${!#lists.isEmpty(detalle)}">
            <td></td>
            <td></td>
            <td colspan="3"><strong>Total</strong></td>
            <td><strong th:text="${totalVlrEgreso != null ? '$ ' + #numbers.formatDecimal(totalVlrEgreso, 1, 'POINT', 2, 'COMMA') : '-'}"></strong></td>
          </tr>

          <tr th:each="d : ${detalle}">
            <td>
              <span th:if="${d.doctoEgreso != null}" th:text="${d.doctoEgreso}"></span>
              <span th:if="${d.doctoEgreso == null}">&nbsp;</span>
            </td>
            <td class="cell-actions">
              <a class="btn btn-compact btn-ver-detalle" th:href="@{/egresos/detallado(doctoEgreso=${d.doctoEgreso})}">Ver detalle</a>
            </td>
            <td th:text="${d.fechaEgreso != null ? #temporals.format(d.fechaEgreso, 'dd/MM/yyyy') : '-'}"></td>
            <td th:text="${d.tercero}"></td>
            <td th:text="${d.razonSocial}"></td>
            <td th:text="${d.vlrEgreso != null ? '$ ' + #numbers.formatDecimal(d.vlrEgreso, 1, 'POINT', 2, 'COMMA') : '-'}"></td>
          </tr>

          <tr th:if="${#lists.isEmpty(detalle)}">
            <td colspan="6" style="text-align: center; padding: 20px;">No se encontraron registros en egresos_plano.</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div id="modal" class="modal hidden" onclick="closeModal()">

      <div class="modal-content" onclick="event.stopPropagation()">
  <div class="modal-head">
    <h3>Nuevo egreso</h3>
    <button class="btn" type="button" onclick="closeModal()" aria-label="Cerrar modal">X</button>
  </div>

  <form class="modal-form"
        method="post"
        th:action="@{/egresos}"
        enctype="multipart/form-data">

    <div class="field-row">
      <label for="m-fechaDocumento">Fecha documento</label>
      <input id="m-fechaDocumento"
             type="date"
             name="fechaDocumento"
             required>
    </div>

    <div class="field-row">
      <label for="m-soportes">Soportes</label>
      <input id="m-soportes"
             type="file"
             name="soportes"
             accept="application/pdf,image/*"
             multiple>
      <small>Puedes seleccionar varios archivos PDF o imágenes.</small>
    </div>

    <div class="modal-actions">
      <button class="btn" type="button" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" type="submit">Guardar</button>
    </div>
  </form>
</div>

    </div>
  </main>

  <script>
    function openModal() {
      var modal = document.getElementById('modal');
      if (modal) {
        modal.classList.remove('hidden');
      }
    }

    function closeModal() {
      var modal = document.getElementById('modal');
      if (modal) {
        modal.classList.add('hidden');
      }
    }

    if (window.lucide) {
      window.lucide.createIcons();
    }
  </script>
</body>
</html>
