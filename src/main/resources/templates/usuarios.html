    <div class="page-head-left">
      <h1>Usuarios</h1>
      <p class="subtitle-main">Gestión de Accesos de Usuario</p>
    </div>
    <div class="actions">
      <button id="btnNuevo" class="btn primary" type="button">
        <span class="btn-icon-wrap" aria-hidden="true">
          <img class="btn-icon-img" th:src="@{/icons/newUserIcon.png}" alt="">
        </span>
        <span>Nuevo usuario</span>
      </button>
    </div>
  </div>

  <div class="users-toolbar" role="tablist" aria-label="Filtros de usuarios">
    <button class="users-tab is-active" type="button" data-user-filter="all" role="tab" aria-selected="true">
      <span>Todos</span>
      <span id="filterAllCount" class="tab-count">0</span>
    </button>
    <button class="users-tab" type="button" data-user-filter="inactive" role="tab" aria-selected="false">
      <span>Inactivos</span>
      <span id="filterInactiveCount" class="tab-count">0</span>
    </button>

      <div class="role-body">
        <ul class="user-list" id="list-admin">
            <li th:each="u,iterStat : ${porRol['ADMINISTRADOR']}" class="user-item"
              th:classappend="(${#strings.equalsIgnoreCase(u.estado_u, 'inactivo')} ? ' is-disabled' : '') + (${iterStat.index % 3 == 0} ? ' is-featured' : '')">
            <div class="user-main">
              <div class="user-avatar-wrap">
                <img class="user-avatar-icon user-avatar-img" th:src="@{/icons/adminIcon.png}" alt="">
                <span class="status-dot"
                      th:classappend="${#strings.equalsIgnoreCase(u.estado_u, 'inactivo')} ? ' is-inactive' : ' is-active'"></span>
              </div>
              <div class="user-meta">
                <strong th:text="${u.nombreUsuario}">Nombre</strong><br>
                <small th:text="${u.codigo}">COD</small>
              </div>
            </div>
            <div class="row-actions">
              <button class="icon-btn" type="button" th:attr="data-edit=${u.codigo}">Editar</button>

              <div class="user-menu">
                <button class="kebab-btn" type="button">⋮</button>
                <ul class="kebab-dropdown">
                  <li>
                    <button type="button" class="menu-item"

                      <span class="menu-icon" aria-hidden="true" th:if="${#strings.equalsIgnoreCase(u.estado_u, 'inactivo')}">
                        <svg class="menu-icon-svg menu-icon-enable" viewBox="0 0 24 24" role="img" focusable="false">
                          <circle cx="12" cy="12" r="9"></circle>
                          <path d="M8.5 12.5l2.5 2.5 4.5-5"></path>
                        </svg>
                      </span>
                      <span class="menu-icon" aria-hidden="true" th:unless="${#strings.equalsIgnoreCase(u.estado_u, 'inactivo')}">

                      <span class="menu-label" th:text="${#strings.equalsIgnoreCase(u.estado_u, 'inactivo')} ? 'Activar' : 'Inactivar'">Inactivar</span>
                    </button>
                  </li>

        </ul>

</main>

<!-- Modal -->
<div id="modal" class="modal hidden" aria-hidden="true">
  <div class="modal-backdrop" data-close="1"></div>
  <div class="modal-card" role="dialog" aria-modal="true">
    <div class="modal-head">
      <h2 id="modalTitle">Nuevo usuario</h2>
      <button class="icon-btn" type="button" data-close="1">✕</button>
    </div>

    <form id="formUsuario" class="form" autocomplete="off">

      <!-- anti-autofill -->
      <input type="text" name="fakeusernameremembered" style="display:none">
      <input type="password" name="fakepasswordremembered" style="display:none">

      <label>
        Código
        <input id="codigo" name="codigo" maxlength="30" required autocomplete="off">
      </label>

      <label>
        Rol
        <select id="rol" name="rol" required autocomplete="off">
          <option value="ADMINISTRADOR">ADMINISTRADOR</option>
          <option value="PUBLICADOR">PUBLICADOR</option>
          <option value="PROVEEDORES">PROVEEDORES</option>
        </select>
      </label>

      <label>
        Nombre
        <input id="nombre_usuario" name="nombre_usuario" maxlength="100" autocomplete="off" required>
      </label>

      <label>
        Email
        <input id="email" name="email" maxlength="120" autocomplete="off">
      </label>

      <label>
        Clave
        <!-- ✅ EL FIX IMPORTANTE: id y name correctos -->
        <input id="password_hash" name="password_hash"
               type="password" maxlength="150" autocomplete="new-password" required>
      </label>

      <div class="form-actions">
        <button type="button" class="btn" data-close="1">Cancelar</button>
        <button type="submit" class="btn primary">Guardar</button>
      </div>

      <p id="formMsg" class="msg"></p>
    </form>
  </div>
</div>

<script th:src="@{/JS/usuarios.js}"></script>
