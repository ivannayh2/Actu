<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <title>Restablecer contraseña</title>
  <link rel="icon" type="image/x-icon" th:href="@{/img/logo.ico}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" th:href="@{/JS/css/login.css}">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body>
  <div class="card">
    <h2>Nueva contraseña</h2>

    <form method="post" th:action="@{/reset-password}">
      <input type="hidden" name="token" th:value="${token}"/>

      <label>Nueva clave</label>
      <input name="clave" type="password" required />

      <label>Confirmar clave</label>
      <input name="clave2" type="password" required />

      <button type="submit">Guardar</button>
    </form>

    <div class="msg" th:if="${error}" th:text="${error}" style="color:red;"></div>
  </div>
</body>
</html>
