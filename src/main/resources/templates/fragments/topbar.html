<th:block th:fragment="topbar(active)">
<header class="topbar">
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Abrir menú">☰</button>

  <div class="topbar-spacer"></div>

  <div class="profile-section">
    <div class="user-info">
      <div class="avatar">👤</div>
      <span sec:authentication="name">Usuario</span>
    </div>

    <form class="logout-form" th:action="@{/logout}" method="post">
      <button type="submit" class="logout-btn">
        <img class="logout-icon" th:src="@{/icons/salida.svg}" src="/icons/salida.svg" alt="" aria-hidden="true">
        <span>Salir</span>
      </button>
    </form>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var toggle = document.getElementById('sidebarToggle');
    var overlay = document.getElementById('sidebarOverlay');
    if (!toggle || !overlay) return;

    function closeSidebar() {
      document.body.classList.remove('sidebar-open');
      document.querySelectorAll('#sidebar details[open]').forEach(function (item) {
        item.open = false;
      });
    }

    toggle.addEventListener('click', function () {
      if (document.body.classList.contains('sidebar-open')) {
        closeSidebar();
        return;
      }
      document.body.classList.add('sidebar-open');
    });

    overlay.addEventListener('click', closeSidebar);
  });
</script>
</th:block>
