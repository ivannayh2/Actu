<th:block th:fragment="topbar(active)">
<header class="topbar">
  <button class="sidebar-toggle" id="sidebarToggle" aria-label="Abrir menú">☰</button>

  <div class="topbar-spacer"></div>

  <div class="profile-section">
    <div class="user-info">
      <div class="avatar" style="overflow:hidden;width:36px;height:36px;border-radius:50%;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;background:#fff;">
        <img th:if="${fotoPerfil != null}" th:src="${'/uploads/perfiles/' + codigo + '/' + fotoPerfil}" alt="Foto de perfil" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" />
        <span th:if="${fotoPerfil == null}" th:text="${(nombreUsuario != null and !#strings.isEmpty(nombreUsuario)) ? #strings.toUpperCase(#strings.substring(nombreUsuario, 0, 1)) : 'U'}" style="font-size:18px;color:#888;">U</span>
      </div>
      <span sec:authentication="name">Usuario</span>
    </div>

    <form class="logout-form" th:action="@{/logout}" method="post">
      <button type="submit" class="logout-btn">
        <img class="logout-icon" th:src="@{/icons/salida.svg}" src="/icons/salida.svg" alt="" aria-hidden="true">
        <span>Salir</span>
      </button>
    </form>
  </div>
</header>

<div class="sidebar-overlay" id="sidebarOverlay"></div>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var toggle = document.getElementById('sidebarToggle');
    var overlay = document.getElementById('sidebarOverlay');
    if (!toggle || !overlay) return;

    function closeSidebar() {
      document.body.classList.remove('sidebar-open');
      document.querySelectorAll('#sidebar details[open]').forEach(function (item) {
        item.open = false;
      });
    }

    toggle.addEventListener('click', function () {
      if (document.body.classList.contains('sidebar-open')) {
        closeSidebar();
        return;
      }
      document.body.classList.add('sidebar-open');
    });

    overlay.addEventListener('click', closeSidebar);
  });
</script>
</th:block>
