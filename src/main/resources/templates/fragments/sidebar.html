<aside class="sidebar" id="sidebar" th:fragment="sidebar(active)">
  <div class="sidebar-header">
    <div class="logo">
      <img th:src="@{/img/logo.png}" alt="Logo">
    </div>
  </div>

  <nav class="sidebar-nav">
     <a sec:authorize="isAuthenticated()"
       th:href="@{/home}" th:classappend="${active}=='home' ? 'active' : ''">
       <i class="icon-home"></i> <span>Inicio</span>
    </a>
     <a sec:authorize="isAuthenticated()"
       th:href="@{/egresos}" th:classappend="${active}=='egresos' ? 'active' : ''">
       <i class="icon-egresos"></i> <span>Comprobante egreso</span>
    </a>
     <a sec:authorize="isAuthenticated()"
       th:href="@{/historial}" th:classappend="${active}=='historial' ? 'active' : ''">
       <i class="icon-history"></i> <span>Historial</span>
    </a>

         <details class="nav-group"
           sec:authorize="hasAnyAuthority('ADMINISTRADOR', 'PUBLICADOR', 'PROVEEDORES')">
      <summary class="nav-group-toggle"
            th:classappend="${active == 'configuracion' or active == 'usuarios' or active == 'perfil'} ? 'active' : ''">
        <i class="icon-user"></i>
        <span>Configuración</span>
        <span class="nav-group-caret" aria-hidden="true">▾</span>
      </summary>
      <nav class="nav-submenu">
        <a sec:authorize="hasAnyAuthority('ADMINISTRADOR', 'USUARIOS')"
          th:href="@{/usuarios}" th:classappend="${active}=='usuarios' ? 'active' : ''">
          <span>Usuarios</span>
        </a>
        <a sec:authorize="hasAnyAuthority('ADMINISTRADOR', 'PUBLICADOR', 'PROVEEDORES')"
          th:href="@{/configuracion/perfil}" th:classappend="${active}=='perfil' ? 'active' : ''">
          <span>Perfil</span>
        </a>
      </nav>
     </details>
  </nav>
</aside>
