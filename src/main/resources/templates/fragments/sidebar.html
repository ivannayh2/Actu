<aside class="sidebar" id="sidebar" th:fragment="sidebar(active)" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
  <div class="sidebar-header">
    <div class="logo">
      <img th:src="@{/img/logo.png}" alt="Logo">
    </div>
  </div>

  <nav class="sidebar-nav">
      <!-- ADMINISTRADOR ve todo sin restricciones -->
      <a sec:authorize="hasAuthority('ADMINISTRADOR')"
         th:href="@{/home}" th:classappend="${active}=='home' ? 'active' : ''">
         <i class="icon-home"></i> <span>Importar Archivos</span>
      </a>
      <a sec:authorize="hasAuthority('ADMINISTRADOR')"
         th:href="@{/egresos}" th:classappend="${active}=='egresos' ? 'active' : ''">
         <i class="icon-egresos"></i> <span>Comprobante egreso</span>
      </a>
      <a sec:authorize="hasAuthority('ADMINISTRADOR')"
         th:href="@{/historial}" th:classappend="${active}=='historial' ? 'active' : ''">
         <i class="icon-history"></i> <span>Historial</span>
      </a>
      <details class="nav-group" sec:authorize="hasAuthority('ADMINISTRADOR')">
        <summary class="nav-group-toggle"
                 th:classappend="${active == 'configuracion' or active == 'usuarios' or active == 'perfil'} ? 'active' : ''">
          <i class="icon-user"></i>
          <span>Configuración</span>
          <span class="nav-group-caret" aria-hidden="true">▾</span>
        </summary>
        <nav class="nav-submenu">
          <a th:href="@{/usuarios}" th:classappend="${active}=='usuarios' ? 'active' : ''">
            <span>Usuarios</span>
          </a>
          <a th:href="@{/configuracion/perfil}" th:classappend="${active}=='perfil' ? 'active' : ''">
            <span>Perfil</span>
          </a>
        </nav>
      </details>

      <!-- PUBLICADOR ve solo lo que le corresponde -->
      <a sec:authorize="hasAuthority('PUBLICADOR')"
         th:href="@{/home}" th:classappend="${active}=='home' ? 'active' : ''">
         <i class="icon-home"></i> <span>Importar Archivos</span>
      </a>
      <a sec:authorize="hasAuthority('PUBLICADOR')"
         th:href="@{/egresos}" th:classappend="${active}=='egresos' ? 'active' : ''">
         <i class="icon-egresos"></i> <span>Comprobante egreso</span>
      </a>
      <a sec:authorize="hasAuthority('PUBLICADOR')"
         th:href="@{/historial}" th:classappend="${active}=='historial' ? 'active' : ''">
         <i class="icon-history"></i> <span>Historial</span>
      </a>
      <details class="nav-group" sec:authorize="hasAuthority('PUBLICADOR')">
        <summary class="nav-group-toggle"
                 th:classappend="${active == 'configuracion' or active == 'usuarios' or active == 'perfil'} ? 'active' : ''">
          <i class="icon-user"></i>
          <span>Configuración</span>
          <span class="nav-group-caret" aria-hidden="true">▾</span>
        </summary>
        <nav class="nav-submenu">
          <a th:href="@{/usuarios}" th:classappend="${active}=='usuarios' ? 'active' : ''">
            <span>Usuarios</span>
          </a>
          <a th:href="@{/configuracion/perfil}" th:classappend="${active}=='perfil' ? 'active' : ''">
            <span>Perfil</span>
          </a>
        </nav>
      </details>

      <!-- PROVEEDORES mantiene su lógica actual -->
      <a sec:authorize="hasAuthority('PROVEEDORES')"
         th:href="@{/egresos}" th:classappend="${active}=='egresos' ? 'active' : ''">
         <i class="icon-egresos"></i> <span>Comprobante egreso</span>
      </a>
      <details class="nav-group"
               sec:authorize="hasAuthority('PROVEEDORES')">
        <summary class="nav-group-toggle"
                 th:classappend="${active == 'configuracion' or active == 'perfil'} ? 'active' : ''">
          <i class="icon-user"></i>
          <span>Configuración</span>
          <span class="nav-group-caret" aria-hidden="true">▾</span>
        </summary>
        <nav class="nav-submenu">
          <a th:href="@{/configuracion/perfil}" th:classappend="${active}=='perfil' ? 'active' : ''">
            <span>Perfil</span>
          </a>
        </nav>
      </details>
  </nav>
</aside>
